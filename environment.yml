name: alphagenome-serova
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core scientific
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  # Bioinformatics tools (easier via conda)
  - pysam>=0.22
  - htslib          # tabix, bgzip for VCF handling
  - samtools
  # Visualisation
  - matplotlib>=3.8
  - seaborn>=0.13
  # Notebook
  - jupyter
  - ipykernel
  - pip:
    - pyfaidx>=0.7.2
    - pyranges>=0.0.129
    - openpyxl>=3.1.2
    - requests>=2.31
    - tqdm>=4.66
    - scikit-learn>=1.3
    - plotly>=5.18
    - jinja2>=3.1
    - nbconvert>=7.11
    - python-dotenv>=1.0
    - pyyaml>=6.0.1
    - loguru>=0.7.2
    - joblib>=1.3.2
    - pyarrow>=14.0
    # AlphaGenome installed separately – see setup.sh
